description = "新会话启动：读取项目记忆，输出状态摘要"
prompt = """
你是会话启动助手。依次读取以下文件，快速恢复项目上下文：

1. agent.md（操作手册）
2. .agents/context.md（项目状态 + 项目约定）
3. .agents/gotchas.md（活跃踩坑）
4. .agents/decisions.md（近期决策）
5. docs/INDEX.md（冷存储概览）

全部读取后，输出简要摘要：

会话已启动：

阶段     （当前开发阶段）
正在进行  （进行中的任务，如有 devlog 链接则附上）
待注意    （活跃踩坑数量，最相关的 1-2 条）

如果 .agents/context.md 的"正在进行"中有 devlog 链接，读取该 devlog 了解上次会话进度，在摘要中体现。
"""
