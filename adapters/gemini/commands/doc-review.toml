description = "文档健康检查：扫描热文件和冷存储，发现过期、失效、需更新的文档"
prompt = """
你是文档健康检查助手。全面扫描项目文档的健康状态，生成报告。

## Step 1: 检查热文件

gotchas.md：逐条检查，引用的文件/库/模块是否仍存在于项目中。不再相关的 → 建议归档到 docs/knowledge/ 或删除。

decisions.md：逐条检查，超过 30 天的决策 → 建议归档（移至对应 devlog 或升级为 ADR）。

context.md：对比最近的 devlog，检查"正在进行"和"待启动"是否与实际状态一致。不一致 → 建议更新。

## Step 2: 扫描 knowledge 文件

遍历 docs/knowledge/，提取文档中引用的源码路径，检查源码是否存在、自文档更新以来的提交次数。提交次数 > 10 或已删除 → 可能过期。

## Step 3: 扫描 plans 文件

遍历 docs/plans/，检查是否已有状态标记。无标记的对比 .agents/context.md 判断是否已完成。已完成 → 建议标记完成。

## Step 4: 验证 INDEX.md

检查每个链接是否有效，检查 docs/ 下是否有未收录文件。

## Step 5: 生成报告

输出热文件状态（gotchas/decisions/context）、冷存储状态（knowledge/plans/research/devlog）、INDEX.md 问题。所有健康则输出"所有文档状态正常，无需处理"。

## Step 6: 等待用户确认后执行

- 过期 gotchas → 移至 docs/knowledge/ 或删除
- 过期 decisions → 移至 devlog 或升级 ADR
- context.md 不一致 → 更新
- 过期 knowledge → 重新阅读源码更新
- 已完成 plans → 文件头部添加 > 状态：已完成（YYYY-MM-DD）
- 死链接 → 移除
- 未收录 → 追加到 INDEX.md
"""
